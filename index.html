<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Webpage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   
    

    
    <div class="form-container">

    <!-- The HTML elements where the results will be shown -->
    <h2>User Status</h2>
    <div id="output-message"></div>

    <!-- Container to display result -->
    
    <div id="quote-container"></div>
     
     <h2>User Personal Information</h2>
     <form id="userForm">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="userName" name="name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label for="age">Age:</label>
            <input type="number" id="userAge" name="age" placeholder="Enter your age" min="1" max="125" required>
          
        </div>
            <button type="submit">Submit</button>
    
    
    <!-- Age Calculation in Months: -->
    <label for="birthdate">Select your Birthdate:</label>
    <input type="date" id="birthdate">
    
    <!-- Button to trigger calculation -->
    <button onclick="displayAgeInMonths()">Calculate Age</button>
    <p id="result"></p>
    
</form>
    
</div>
 <script src="script.js"></script>
</body>
</html>
